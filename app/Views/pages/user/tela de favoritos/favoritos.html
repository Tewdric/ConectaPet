<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Favoritos - PetAdopt</title>
  <link rel="stylesheet" href="favoritos.css"/>
</head>
<body>

  <nav>
    <img src="logo.png" class="nav-logo" alt="Logo PetAdopt">

    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">Sobre</a>
      <a href="#">Animais</a>
      <a href="#">Contato</a>
      <a href="#">Publicar Animal</a>
    </div>
    <img src="acessibilidade.png" class="icon-acessibilidade" alt="Acessibilidade">
    <img src="user.png" class="icon-user" alt="Usuário">
  </nav>

  <div class="main-card">

    <span class="section-title">❤️ Meus Favoritos</span>

    <div class="filter-bar" style="margin-top:18px;">
      <button class="filter-btn active" onclick="filterCards(this,'todos')">Todos</button>
      <button class="filter-btn" onclick="filterCards(this,'gato')">Gatos</button>
      <button class="filter-btn" onclick="filterCards(this,'cachorro')">Cachorros</button>
      <button class="filter-btn" onclick="filterCards(this,'outros')">Outros</button>
    </div>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Buscar animal favorito..." oninput="searchCards()"/>
    </div>

    <div class="pets-grid" id="petsGrid">

      <div class="pet-card" data-type="gato" data-name="luna">
        <div class="pet-emoji-banner">
          <img src="dalmata.png" alt="Luna" class="pet-img">
        </div>
        <button class="fav-btn" onclick="toggleFav(this)">❤️</button>
        <div class="pet-card-body">
          <div class="pet-name">Luna</div>
          <div class="pet-info">Gata · 2 anos · Fêmea</div>
          <div class="pet-tags">
            <span class="tag">Vacinada</span>
            <span class="tag">Castrada</span>
          </div>
          <div class="pet-card-footer">
            <div><span class="status-dot"></span><span class="status-text">Disponível</span></div>
            <button class="adopt-btn">Adotar</button>
          </div>
        </div>
      </div>

      <div class="pet-card" data-type="cachorro" data-name="thor">
        <div class="pet-emoji-banner">
          <img src="gato.png" alt="Thor" class="pet-img">
        </div>
        <button class="fav-btn" onclick="toggleFav(this)">❤️</button>
        <div class="pet-card-body">
          <div class="pet-name">Thor</div>
          <div class="pet-info">Cachorro · 3 anos · Macho</div>
          <div class="pet-tags">
            <span class="tag">Vacinado</span>
            <span class="tag">Dócil</span>
          </div>
          <div class="pet-card-footer">
            <div><span class="status-dot"></span><span class="status-text">Disponível</span></div>
            <button class="adopt-btn">Adotar</button>
          </div>
        </div>
      </div>

      <div class="pet-card" data-type="gato" data-name="mel">
        <div class="pet-emoji-banner">
          <img src="mel.png" alt="Mel" class="pet-img">
        </div>
        <button class="fav-btn" onclick="toggleFav(this)">❤️</button>
        <div class="pet-card-body">
          <div class="pet-name">Mel</div>
          <div class="pet-info">Gata · 1 ano · Fêmea</div>
          <div class="pet-tags">
            <span class="tag">Vacinada</span>
            <span class="tag">Filhote</span>
          </div>
          <div class="pet-card-footer">
            <div><span class="status-dot" style="background:#e8a800;"></span><span class="status-text" style="color:#a07830;">Em análise</span></div>
            <button class="adopt-btn">Adotar</button>
          </div>
        </div>
      </div>

    </div>

    <div class="empty-state" id="emptyState">
      <div class="emoji">🐾</div>
      <p>Nenhum favorito encontrado.</p>
    </div>

  </div>

  <script>
    let activeFilter = 'todos';

    function filterCards(btn, type) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = type;
      applyFilters();
    }

    function searchCards() { applyFilters(); }

    function applyFilters() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const cards = document.querySelectorAll('.pet-card');
      let visible = 0;

      cards.forEach(card => {
        const matchType = activeFilter === 'todos' || card.dataset.type === activeFilter;
        const matchName = card.dataset.name.toLowerCase().includes(query);

        if (matchType && matchName) {
          card.style.display = '';
          visible++;
        } else {
          card.style.display = 'none';
        }
      });

      document.getElementById('emptyState').style.display = visible === 0 ? 'block' : 'none';
    }

    function toggleFav(btn) {
      btn.textContent = btn.textContent === '❤️' ? '🤍' : '❤️';
    }
  </script>

</body>
</html>
